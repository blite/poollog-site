# Feature List                            Edit, add or remove features to be presented.
features                                  :

  - title                                 : Instant Chemical Recommendations
    description                           : Test your water, enter the results, and get precise dosing instructions for chlorine, pH, alkalinity, and more in seconds.
    fontawesome_icon_name                 : flask

  - title                                 : Track Multiple Pools
    description                           : Manage your backyard pool, hot tub, and rental properties from one app with Premium.
    fontawesome_icon_name                 : swimming-pool

  - title                                 : History and Trends
    description                           : Beautiful charts show how your water chemistry changes over time so you can see what works.
    fontawesome_icon_name                 : chart-line

  - title                                 : Weather Integration
    description                           : Automatic weather tracking helps you understand what affects your pool without requiring location permissions.
    fontawesome_icon_name                 : cloud-sun

  - title                                 : Smart Reminders
    description                           : Never forget to test your water with customizable notifications that pause when your pool is closed.
    fontawesome_icon_name                 : bell

  - title                                 : SLAM Mode
    description                           : Special mode for shocking your pool with step-by-step guidance and elevated chlorine targets.
    fontawesome_icon_name                 : bolt

  - title                                 : Works Offline
    description                           : All chemistry calculations work offline. No internet required for recommendations.
    fontawesome_icon_name                 : wifi

  - title                                 : Privacy First
    description                           : Your data stays on your device with optional iCloud sync. We do not collect, track, or sell your data.
    fontawesome_icon_name                 : shield-alt

  - title                                 : All Pool Types
    description                           : Support for chlorine, bromine, salt water generators, and all common sanitizer systems.
    fontawesome_icon_name                 : water

  - title                                 : Expense Tracking
    description                           : Track maintenance costs and export to CSV with Premium for tax time or budget analysis.
    fontawesome_icon_name                 : dollar-sign



